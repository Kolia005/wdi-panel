<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script>
			window.addEventListener('error', function (e) {
				window.__HYDERR = (window.__HYDERR || '') + '\n' + (e.message || '') + ' @ ' + (e.filename || '') + ':' + e.lineno + ' :: ' + ((e.error && e.error.stack) || '').slice(0, 500);
			});
			window.addEventListener('unhandledrejection', function (e) {
				window.__HYDERR = (window.__HYDERR || '') + '\nPROMISE: ' + ((e.reason && (e.reason.stack || e.reason.message)) || e.reason);
			});
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		%sveltekit.body%
	</body>
</html>
